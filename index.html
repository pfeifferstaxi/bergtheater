<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bergtheater Fahrer-Planer</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================
           ALLGEMEINE STYLES
           ========================================= */
        body { 
            -webkit-tap-highlight-color: transparent; 
        }
        
        #singlePrintArea { 
            display: none; 
        }

        /* =========================================
           DRUCK-STYLES (Print Media Query)
           ========================================= */
        @media print {
            .no-print { display: none !important; }
            body { background-color: white; }
            .event-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 1rem; }
            
            /* --- Modus: Einzeldruck einer Veranstaltung --- */
            body.print-single-mode header,
            body.print-single-mode main,
            body.print-single-mode #eventModal,
            body.print-single-mode .fixed {
                display: none !important;
            }
            
            body.print-single-mode #singlePrintArea {
                display: block !important;
                padding: 10px;
                font-family: Arial, sans-serif;
                color: black;
            }

            /* Spezifische Einzeldruck-Klassen (ersetzen die langen Inline-Styles) */
            .print-header-box {
                border-bottom: 3px solid #4f46e5;
                padding-bottom: 10px;
                margin-bottom: 25px;
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
            .print-title { font-size: 22px; font-weight: bold; color: #4f46e5; margin: 0; }
            .print-timestamp { font-size: 12px; color: #475569; }
            .print-event-name { font-size: 24px; font-weight: bold; margin: 0 0 10px 0; }
            .print-meta-box {
                font-size: 15px;
                margin-bottom: 25px;
                background-color: #f8fafc;
                padding: 12px;
                border: 1px solid #e2e8f0;
                border-radius: 6px;
            }
            .print-table { width: 100%; border-collapse: collapse; margin-top: 20px; border: 1px solid #cbd5e1; font-size: 15px; }
            .print-table th { padding: 12px 10px; font-weight: bold; text-align: left; background-color: #f1f5f9; border-bottom: 2px solid #4f46e5; border-right: 1px solid #cbd5e1; }
            .print-table td { padding: 12px 10px; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans pb-20">

    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 no-print">
        <h1 class="text-xl font-bold text-center mb-4"><i class="fa-solid fa-van-shuttle mr-2"></i> Fahrer-Planer</h1>
        <div class="grid grid-cols-5 gap-2 text-xs">
            <button onclick="document.getElementById('excelUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-file-excel text-lg mb-1"></i> <span class="text-center">Excel<br>Import</span>
            </button>
            <input type="file" id="excelUpload" accept=".xlsx, .xls" class="hidden" onchange="handleExcelImport(event)">

            <button onclick="exportBackup()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-download text-lg mb-1"></i> <span class="text-center">Backup<br>Speichern</span>
            </button>

            <button onclick="document.getElementById('backupUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-upload text-lg mb-1"></i> <span class="text-center">Backup<br>Laden</span>
            </button>
            <input type="file" id="backupUpload" accept=".json, application/json, text/plain, */*" class="hidden" onchange="handleBackupImport(event)">

            <button onclick="deleteAllEvents()" class="bg-red-500 hover:bg-red-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-trash-can text-lg mb-1"></i> <span class="text-center">Alle<br>Löschen</span>
            </button>

            <button onclick="window.print()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-print text-lg mb-1"></i> <span class="text-center">Liste<br>Drucken</span>
            </button>
        </div>
    </header>

    <main id="eventList" class="p-4 max-w-3xl mx-auto space-y-4"></main>

    <div id="singlePrintArea"></div>

    <div id="eventModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-end sm:items-center no-print">
        <div class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto flex flex-col">
            
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10">
                <h2 id="modalTitle" class="font-bold text-lg truncate pr-2">Event</h2>
                <button onclick="closeModal()" class="text-slate-500 text-2xl px-2">&times;</button>
            </div>
            
            <div class="p-4 flex-grow">
                <p class="text-sm text-slate-500 mb-4" id="modalDateTime"></p>

                <div id="driverList" class="space-y-3 mb-4"></div>

                <div id="modalPrintContainer" class="hidden mb-6">
                    <button onclick="printEvent(currentEventId)" class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2.5 px-4 rounded-xl transition flex items-center justify-center gap-2 shadow-sm">
                        <i class="fa-solid fa-print"></i> Diese Veranstaltung einzeln drucken
                    </button>
                </div>

                <hr class="my-4 border-slate-200">

                <h3 class="font-semibold text-indigo-600 mb-3"><i class="fa-solid fa-user-plus mr-1"></i> Weiteren Fahrer hinzufügen</h3>
                <div class="space-y-3 bg-slate-50 p-3 rounded-lg border">
                    
                    <select id="driverName" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none bg-white">
                    </select>
                    
                    <div class="grid grid-cols-2 gap-2 text-sm">
                        <label class="flex items-center space-x-2 bg-white p-2 rounded border"><input type="radio" name="duty" value="Hinfahrt" class="text-indigo-600"> <span>Hinfahrt</span></label>
                        <label class="flex items-center space-x-2 bg-white p-2 rounded border"><input type="radio" name="duty" value="Rückfahrt" class="text-indigo-600"> <span>Rückfahrt</span></label>
                        <label class="flex items-center space-x-2 bg-white p-2 rounded border col-span-2"><input type="radio" name="duty" value="Hin- und Rückfahrt" checked class="text-indigo-600"> <span>Hin- & Rückfahrt</span></label>
                    </div>

                    <div class="text-sm font-medium mt-2">Besucht die Veranstaltung?</div>
                    <div class="flex space-x-4 text-sm">
                        <label class="flex items-center space-x-2"><input type="radio" name="attends" value="Ja" class="text-indigo-600"> <span>Ja</span></label>
                        <label class="flex items-center space-x-2"><input type="radio" name="attends" value="Nein" checked class="text-indigo-600"> <span>Nein</span></label>
                    </div>

                    <div class="flex space-x-2 text-sm mt-2">
                        <input type="time" id="endTime" class="w-full p-2 border rounded" title="Gibt das Ende der Veranstaltung an">
                        <span class="text-xs text-slate-500 self-center">Endzeit eintragen (optional)</span>
                    </div>

                    <button onclick="addDriver()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded mt-2 transition">
                        Fahrer speichern & hinzufügen
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 1. KONFIGURATION & STATE
        // ==========================================
        const fahrerNamen = [
            "Marco Pfeiffer", "Michaela Lüders", "Michael Lüders", 
            "Kevin Gawe", "Tommy Wall", "Nicole Ritzrau", 
            "Kimberley", "Uwe Busse", "Thomas Kaufmann"
        ];

        let events = JSON.parse(localStorage.getItem('bergtheater_events')) || [];
        let currentEventId = null;

        // ==========================================
        // 2. INITIALISIERUNG
        // ==========================================
        window.onload = () => {
            initDropdown();
            
            if ('serviceWorker' in navigator) {
                navigator.serviceWorker.register('./sw.js')
                    .then(() => console.log('Service Worker registriert'))
                    .catch(err => console.error('Service Worker Fehler:', err));
            }
            
            // Formatierungs-Korrektur bei Excel-Daten
            events = events.map(ev => {
                if (ev.datum && !ev.datum.includes('.')) {
                    ev.datum = formatExcelDate(ev.datum);
                }
                return ev;
            });
            saveData();

            cleanUpOldEvents();
            renderEvents();
        };

        function initDropdown() {
            const select = document.getElementById('driverName');
            let optionsHTML = '<option value="">-- Bitte Fahrer auswählen --</option>';
            fahrerNamen.sort().forEach(name => {
                optionsHTML += `<option value="${name}">${name}</option>`;
            });
            select.innerHTML = optionsHTML;
        }

        // ==========================================
        // 3. RENDERING (Benutzeroberfläche)
        // ==========================================
        function renderEvents() {
            const container = document.getElementById('eventList');
            container.innerHTML = '';

            if(events.length === 0) {
                container.innerHTML = '<div class="text-center text-slate-400 mt-10"><i class="fa-regular fa-calendar-xmark text-4xl mb-3"></i><p>Keine Veranstaltungen vorhanden.<br>Bitte Excel importieren.</p></div>';
                return;
            }

            // Nach Datum sortieren
            events.sort((a,b) => {
                const pa = a.datum.split('.'), pb = b.datum.split('.');
                return new Date(pa[2], pa[1]-1, pa[0]) - new Date(pb[2], pb[1]-1, pb[0]);
            });

            events.forEach(ev => {
                const hasDrivers = ev.drivers && ev.drivers.length > 0;
                
                const driverNames = hasDrivers 
                    ? ev.drivers.map(d => `<span class="bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded inline-block mr-1 mb-1"><i class="fa-solid fa-user mr-1"></i>${d.name}</span>`).join('') 
                    : '<span class="text-slate-400 text-xs italic">Noch keine Fahrer eingeteilt</span>';

                const printButton = hasDrivers 
                    ? `<button onclick="printEvent('${ev.id}', event)" class="text-indigo-500 hover:text-indigo-700 px-2 no-print" title="Diese Veranstaltung einzeln drucken"><i class="fa-solid fa-print"></i></button>`
                    : '';

                let uhrzeitAnzeige = formatTimeDisplay(ev.uhrzeit, ev.endTime);
                const datumAnzeige = getWochentag(ev.datum) ? `${getWochentag(ev.datum)} ${ev.datum}` : ev.datum;

                const card = document.createElement('div');
                card.className = "event-card bg-white p-4 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-400 transition";
                card.onclick = () => openModal(ev.id);
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-2">
                        <h3 class="font-bold text-lg leading-tight text-slate-800">${ev.name}</h3>
                        <div class="flex space-x-1 no-print">
                            ${printButton}
                            <button onclick="deleteEvent('${ev.id}', event)" class="text-red-400 hover:text-red-600 px-2"><i class="fa-solid fa-trash-can"></i></button>
                        </div>
                    </div>
                    <div class="text-sm text-slate-600 mb-3 font-medium">
                        <i class="fa-regular fa-calendar text-indigo-500 mr-1"></i> ${datumAnzeige} | 
                        <i class="fa-regular fa-clock text-indigo-500 mr-1"></i> ${uhrzeitAnzeige}
                    </div>
                    <div class="border-t pt-3 mt-2">
                        ${driverNames}
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function renderDriverList(ev) {
            const container = document.getElementById('driverList');
            container.innerHTML = '';

            if(!ev.drivers || ev.drivers.length === 0) return;

            ev.drivers.forEach((d, index) => {
                const div = document.createElement('div');
                div.className = "bg-white border rounded-lg p-3 flex flex-col sm:flex-row justify-between items-start sm:items-center shadow-sm";
                div.innerHTML = `
                    <div class="mb-2 sm:mb-0">
                        <div class="font-bold text-slate-800">${d.name}</div>
                        <div class="text-xs text-slate-500">
                            Fahrt: <b>${d.duty}</b> | Besuch: <b>${d.attends}</b>
                        </div>
                    </div>
                    <div class="flex space-x-2 w-full sm:w-auto">
                        <button onclick="shareDriverInfo(${index})" class="flex-1 sm:flex-none bg-blue-500 text-white p-2 rounded text-sm hover:bg-blue-600 transition"><i class="fa-solid fa-share-nodes mr-1"></i> Teilen</button>
                        <button onclick="removeDriver(${index})" class="bg-red-100 text-red-600 p-2 rounded text-sm hover:bg-red-200 transition"><i class="fa-solid fa-trash"></i></button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        // ==========================================
        // 4. MODAL STEUERUNG
        // ==========================================
        function openModal(id) {
            currentEventId = id;
            const ev = events.find(e => e.id === id);
            
            const uhrzeitAnzeige = formatTimeDisplay(ev.uhrzeit, ev.endTime);
            const datumAnzeige = getWochentag(ev.datum) ? `${getWochentag(ev.datum)} ${ev.datum}` : ev.datum;

            document.getElementById('modalTitle').innerText = ev.name;
            document.getElementById('modalDateTime').innerText = `${datumAnzeige} ab ${uhrzeitAnzeige}`;
            
            // Druck-Button einblenden, falls Fahrer vorhanden
            const printContainer = document.getElementById('modalPrintContainer');
            printContainer.classList.toggle('hidden', !(ev.drivers && ev.drivers.length > 0));

            // Formular zurücksetzen
            document.getElementById('driverName').value = '';
            document.getElementById('endTime').value = ev.endTime || '';
            document.querySelector('input[name="duty"][value="Hin- und Rückfahrt"]').checked = true;
            document.querySelector('input[name="attends"][value="Nein"]').checked = true;

            renderDriverList(ev);
            document.getElementById('eventModal').classList.remove('hidden');
        }

        function closeModal() {
            document.getElementById('eventModal').classList.add('hidden');
            currentEventId = null;
        }

        // ==========================================
        // 5. FAHRER VERWALTUNG
        // ==========================================
        function addDriver() {
            const name = document.getElementById('driverName').value;
            if(!name) { alert("Bitte einen Fahrer aus der Liste auswählen."); return; }

            const duty = document.querySelector('input[name="duty"]:checked').value;
            const attends = document.querySelector('input[name="attends"]:checked').value;
            const endTime = document.getElementById('endTime').value;

            const ev = events.find(e => e.id === currentEventId);
            if(!ev.drivers) ev.drivers = [];
            
            if(endTime) ev.endTime = endTime; 
            
            ev.drivers.push({ name, duty, attends });
            saveData();
            
            renderDriverList(ev);
            renderEvents(); 

            // Formular nach dem Speichern leeren, aber Modal offen lassen
            document.getElementById('driverName').value = '';
            closeModal();
            openModal(currentEventId); 
        }

        function removeDriver(index) {
            const ev = events.find(e => e.id === currentEventId);
            ev.drivers.splice(index, 1);
            saveData();
            renderDriverList(ev);
            renderEvents();
            
            const printContainer = document.getElementById('modalPrintContainer');
            printContainer.classList.toggle('hidden', ev.drivers.length === 0);
        }

        function shareDriverInfo(driverIndex) {
            const ev = events.find(e => e.id === currentEventId);
            const d = ev.drivers[driverIndex];
            
            let startZeit = ev.uhrzeit ? String(ev.uhrzeit) : "";
            if(startZeit && !startZeit.includes('Uhr')) startZeit += ' Uhr';
            
            let endeText = ev.endTime ? `Ende ca.: ${ev.endTime} Uhr` : "Ende: nach Rücksprache";
            const datumAnzeige = getWochentag(ev.datum) ? `${getWochentag(ev.datum)} ${ev.datum}` : ev.datum;

            const text = `Hallo ${d.name},\nhier sind deine Einsatzdaten für das Bergtheater:\n\nVeranstaltung: ${ev.name}\nDatum: ${datumAnzeige}\nBeginn: ${startZeit}\n${endeText}\n\nDein Dienst: ${d.duty}\nBesuch der Veranstaltung: ${d.attends}\n\nBitte bestätigen. Danke!`;

            if (navigator.share) {
                navigator.share({ title: 'Fahrer-Einteilung Bergtheater', text: text }).catch(console.error);
            } else {
                prompt("Dein Gerät unterstützt kein direktes Teilen. Bitte kopiere diesen Text:", text);
            }
        }

        // ==========================================
        // 6. EVENT VERWALTUNG
        // ==========================================
        function deleteEvent(id, e) {
            if(e) e.stopPropagation(); 
            if(confirm("Veranstaltung wirklich löschen?")) {
                events = events.filter(ev => ev.id !== id);
                saveData();
                renderEvents();
            }
        }

        function deleteAllEvents() {
            if(confirm("Möchtest du WIRKLICH ALLE Veranstaltungen löschen? Dies kann nicht rückgängig gemacht werden!")) {
                events = [];
                saveData();
                renderEvents();
            }
        }

        function cleanUpOldEvents() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            events = events.filter(ev => {
                const parts = ev.datum.split('.'); 
                if(parts.length === 3) {
                    const eventDate = new Date(parts[2], parts[1] - 1, parts[0]);
                    return eventDate >= today; 
                }
                return true; 
            });
            saveData();
        }

        // ==========================================
        // 7. DRUCK FUNKTIONEN
        // ==========================================
        function printEvent(id, e) {
            if(e) e.stopPropagation(); 
            const ev = events.find(evnt => evnt.id === id);
            if(!ev) return;
            
            const uhrzeitAnzeige = formatTimeDisplay(ev.uhrzeit, ev.endTime);
            const datumAnzeige = getWochentag(ev.datum) ? `${getWochentag(ev.datum)} ${ev.datum}` : ev.datum;

            let driversHTML = '';
            if(ev.drivers && ev.drivers.length > 0) {
                driversHTML = `
                    <table class="print-table">
                        <thead>
                            <tr>
                                <th>Fahrer</th>
                                <th>Dienst</th>
                                <th>Besucht Veranstaltung?</th>
                            </tr>
                        </thead>
                        <tbody>
                `;
                ev.drivers.forEach(d => {
                    // Kodierung von Sonderzeichen für den Ausdruck, um Fehlerzeichen () zu vermeiden
                    const safeDuty = d.duty.replace(/ü/g, '&uuml;').replace(/ö/g, '&ouml;').replace(/ä/g, '&auml;');
                    
                    driversHTML += `
                        <tr>
                            <td><strong>${d.name}</strong></td>
                            <td>${safeDuty}</td>
                            <td>${d.attends}</td>
                        </tr>
                    `;
                });
                driversHTML += `</tbody></table>`;
            }

            const printArea = document.getElementById('singlePrintArea');
            printArea.innerHTML = `
                <div class="print-header-box">
                    <h1 class="print-title"><i class="fa-solid fa-van-shuttle"></i> Fahrer-Planung Bergtheater</h1>
                    <span class="print-timestamp">Ausgedruckt am: ${new Date().toLocaleDateString('de-DE')} um ${new Date().toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'})} Uhr</span>
                </div>
                
                <h2 class="print-event-name">${ev.name}</h2>
                
                <div class="print-meta-box">
                    <strong>Datum:</strong> ${datumAnzeige} &nbsp;&nbsp;|&nbsp;&nbsp; <strong>Zeit:</strong> ${uhrzeitAnzeige}
                </div>
                
                <h3 style="font-size: 16px; font-weight: bold; margin: 0 0 10px 0; color: #4f46e5;">Eingeteiltes Personal:</h3>
                ${driversHTML}
            `;
            
            document.body.classList.add('print-single-mode');
            window.print();
            document.body.classList.remove('print-single-mode');
        }

        // ==========================================
        // 8. DATEN & BACKUP (Excel/JSON)
        // ==========================================
        function saveData() {
            localStorage.setItem('bergtheater_events', JSON.stringify(events));
        }

        function handleExcelImport(e) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                const data = new Uint8Array(e.target.result);
                const workbook = XLSX.read(data, {type: 'array'});
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]];
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1, raw: false});

                let importedCount = 0;
                for (let i = 1; i < jsonData.length; i++) {
                    const row = jsonData[i];
                    if (row[0] && row[1] && row[2]) {
                        events.push({
                            id: generateId(),
                            name: row[0],
                            datum: formatExcelDate(row[1]),
                            uhrzeit: row[2],
                            endTime: row[3] || '',
                            drivers: []
                        });
                        importedCount++;
                    }
                }

                if(importedCount > 0) {
                    saveData();
                    cleanUpOldEvents();
                    renderEvents();
                    alert(importedCount + " Veranstaltungen erfolgreich importiert!");
                } else {
                    alert("Konnte keine Daten finden. Bitte prüfe, ob deine Tabelle in Spalte A beginnt.");
                }
            };
            reader.readAsArrayBuffer(file);
            e.target.value = ''; 
        }

        function exportBackup() {
            const dataStr = JSON.stringify(events);
            const blob = new Blob([dataStr], { type: "application/json" });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            const dateStr = new Date().toISOString().split('T')[0];
            a.download = `Bergtheater_Fahrer_Backup_${dateStr}.json`;
            a.click();
            URL.revokeObjectURL(url);
        }

        function handleBackupImport(e) {
            const file = e.target.files[0];
            if(!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const importedEvents = JSON.parse(e.target.result);
                    if(Array.isArray(importedEvents)) {
                        events = importedEvents; 
                        saveData();
                        cleanUpOldEvents();
                        renderEvents();
                        alert("Backup erfolgreich geladen!");
                    } else {
                        alert("Ungültige Backup-Datei.");
                    }
                } catch(err) {
                    alert("Fehler beim Lesen der Backup-Datei.");
                }
            };
            reader.readAsText(file);
            e.target.value = ''; 
        }

        // ==========================================
        // 9. HILFSFUNKTIONEN
        // ==========================================
        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function formatExcelDate(excelDate) {
            const num = Number(excelDate);
            if (!isNaN(num) && num > 30000 && num < 70000) {
                const date = new Date(Math.round((num - 25569) * 86400 * 1000));
                return date.toLocaleDateString('de-DE', {day: '2-digit', month: '2-digit', year: 'numeric'});
            }
            return excelDate; 
        }

        function getWochentag(datumString) {
            if (!datumString) return '';
            const parts = datumString.split('.');
            if (parts.length === 3) {
                const dateObj = new Date(parts[2], parts[1] - 1, parts[0]);
                const tage = ['So.', 'Mo.', 'Di.', 'Mi.', 'Do.', 'Fr.', 'Sa.'];
                return tage[dateObj.getDay()];
            }
            return '';
        }

        function formatTimeDisplay(start, end) {
            let uhrzeit = start ? String(start) : "";
            if (uhrzeit && !uhrzeit.includes('Uhr')) uhrzeit += ' Uhr';
            if (end) {
                let endZeit = String(end);
                if (!endZeit.includes('Uhr')) endZeit += ' Uhr';
                uhrzeit += ` - ${endZeit}`;
            }
            return uhrzeit;
        }
    </script>
</body>
