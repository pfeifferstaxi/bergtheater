   <!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bergtheater Fahrer-Planer</title>
    
    <link rel="manifest" href="./manifest.json">
    <meta name="theme-color" content="#4f46e5">
    <link rel="apple-touch-icon" href="./icon-192.png">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { -webkit-tap-highlight-color: transparent; }
        
        @media print {
            @page { margin: 1.5cm; }
            .no-print { display: none !important; }
            body { background-color: white; color: black; }
            body:not(.print-modal-mode) #eventModal { display: none !important; }
            body:not(.print-modal-mode) .event-card { break-inside: avoid; border: 1px solid #ccc; box-shadow: none; margin-bottom: 1rem; }
            body.print-modal-mode header, body.print-modal-mode #eventList { display: none !important; }
            body.print-modal-mode #eventModal { position: static !important; background: white !important; display: block !important; overflow: visible !important; padding: 0 !important; }
            body.print-modal-mode #eventModal > div { box-shadow: none !important; width: 100% !important; max-width: none !important; max-height: none !important; overflow: visible !important; border: none !important; border-radius: 0 !important; }
            body.print-modal-mode .modal-no-print { display: none !important; }
            body.print-modal-mode #modalTitle { font-size: 20pt !important; border-bottom: 2px solid #4f46e5 !important; padding-bottom: 8px !important; margin-bottom: 10px !important; }
            body.print-modal-mode #modalDateTime { font-size: 14pt !important; color: #333 !important; margin-bottom: 25px !important; }
            body.print-modal-mode #driverList { page-break-inside: auto; margin-top: 20px !important; }
            body.print-modal-mode #driverList > div { page-break-inside: avoid; border: 1px solid #aaa !important; box-shadow: none !important; margin-bottom: 15px !important; padding: 15px !important; background-color: #f8fafc !important; -webkit-print-color-adjust: exact; }
            body.print-modal-mode #driverList .font-bold { font-size: 14pt !important; margin-bottom: 5px !important; }
            body.print-modal-mode #driverList .text-xs { font-size: 12pt !important; }
        }
    </style>
</head>
<body class="bg-slate-100 text-slate-800 font-sans pb-20">

    <header class="bg-indigo-600 text-white p-4 shadow-md sticky top-0 z-10 no-print">
        <h1 class="text-xl font-bold text-center mb-4"><i class="fa-solid fa-van-shuttle mr-2"></i> Fahrer-Planer</h1>
        <div class="grid grid-cols-5 gap-2 text-xs">
            <button onclick="document.getElementById('excelUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-file-excel text-lg mb-1"></i> <span class="text-center">Excel<br>Import</span>
            </button>
            <input type="file" id="excelUpload" accept=".xlsx, .xls" class="hidden" onchange="handleExcelImport(event)">
            <button onclick="exportBackup()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-download text-lg mb-1"></i> <span class="text-center">Backup<br>Speichern</span>
            </button>
            <button onclick="document.getElementById('backupUpload').click()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-upload text-lg mb-1"></i> <span class="text-center">Backup<br>Laden</span>
            </button>
            <input type="file" id="backupUpload" accept=".json, application/json, text/plain, */*" class="hidden" onchange="handleBackupImport(event)">
            <button onclick="deleteAllEvents()" class="bg-red-500 hover:bg-red-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-trash-can text-lg mb-1"></i> <span class="text-center">Alle<br>Löschen</span>
            </button>
            <button onclick="window.print()" class="bg-indigo-500 hover:bg-indigo-400 p-2 rounded flex flex-col items-center justify-center transition">
                <i class="fa-solid fa-print text-lg mb-1"></i> <span class="text-center">Liste<br>Drucken</span>
            </button>
        </div>
    </header>

    <main id="eventList" class="p-4 max-w-3xl mx-auto space-y-4"></main>

    <div id="eventModal" class="fixed inset-0 bg-black bg-opacity-50 z-50 hidden flex justify-center items-end sm:items-center">
        <div class="bg-white w-full sm:max-w-lg rounded-t-2xl sm:rounded-2xl max-h-[90vh] overflow-y-auto flex flex-col">
            <div class="p-4 border-b flex justify-between items-center sticky top-0 bg-white rounded-t-2xl z-10">
                <h2 id="modalTitle" class="font-bold text-lg truncate pr-2">Event</h2>
                <div class="flex items-center space-x-4 modal-no-print">
                    <button id="modalPrintBtn" onclick="printModal()" class="text-indigo-600 hover:text-indigo-800 hidden" title="Veranstaltung drucken"><i class="fa-solid fa-print text-xl"></i></button>
                    <button onclick="closeModal()" class="text-slate-500 hover:text-slate-700 text-3xl leading-none">&times;</button>
                </div>
            </div>
            <div class="p-4 flex-grow">
                <p class="text-sm text-slate-500 mb-4 font-medium" id="modalDateTime"></p>
                <div id="driverList" class="space-y-3 mb-6"></div>
                <div class="modal-no-print">
                    <hr class="my-4 border-slate-200">
                    <h3 class="font-semibold text-indigo-600 mb-3"><i class="fa-solid fa-user-plus mr-1"></i> Weiteren Fahrer hinzufügen</h3>
                    <div class="space-y-3 bg-slate-50 p-3 rounded-lg border">
                        <select id="driverName" class="w-full p-2 border rounded focus:ring-2 focus:ring-indigo-500 outline-none bg-white"></select>
                        <div class="grid grid-cols-2 gap-2 text-sm">
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border"><input type="radio" name="duty" value="Hinfahrt" class="text-indigo-600"> <span>Hinfahrt</span></label>
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border"><input type="radio" name="duty" value="Rückfahrt" class="text-indigo-600"> <span>Rückfahrt</span></label>
                            <label class="flex items-center space-x-2 bg-white p-2 rounded border col-span-2"><input type="radio" name="duty" value="Hin- und Rückfahrt" checked class="text-indigo-600"> <span>Hin- & Rückfahrt</span></label>
                        </div>
                        <div class="text-sm font-medium mt-2">Besucht die Veranstaltung?</div>
                        <div class="flex space-x-4 text-sm">
                            <label class="flex items-center space-x-2"><input type="radio" name="attends" value="Ja" class="text-indigo-600"> <span>Ja</span></label>
                            <label class="flex items-center space-x-2"><input type="radio" name="attends" value="Nein" checked class="text-indigo-600"> <span>Nein</span></label>
                        </div>
                        <div class="flex space-x-2 text-sm mt-2">
                            <input type="time" id="endTime" class="w-full p-2 border rounded" title="Gibt das Ende der Veranstaltung an">
                            <span class="text-xs text-slate-500 self-center">Endzeit eintragen (optional)</span>
                        </div>
                        <button onclick="addDriver()" class="w-full bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded mt-2 transition">Fahrer speichern & hinzufügen</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const fahrerNamen = ["Marco Pfeiffer", "Michaela Lüders", "Michael Lüders", "Kevin Gawe", "Tommy Wall", "Nicole Ritzrau", "Kimberley", "Uwe Busse", "Thomas Kaufmann"];
        
        // Liste mit exakten Startzeiten aus dem Spielplan-PDF und bereinigten Endzeiten.
        // Endzeiten wurden nur dort hinterlegt, wo sie offiziell im System abrufbar sind.
        const geladeneVeranstaltungen = [
            { id: "v_1", name: "voXXclub – Lederhos'n Inferno Tour", datum: "12.06.2026", uhrzeit: "20:00", endTime: "22:00", drivers: [] },
            { id: "v_2", name: "Spider Murphy Gang – Rock'n'Roll Tour 2026", datum: "13.06.2026", uhrzeit: "20:00", endTime: "22:30", drivers: [] },
            { id: "v_3", name: "Remode – The Music of Depeche Mode", datum: "14.06.2026", uhrzeit: "19:00", endTime: "21:00", drivers: [] },
            { id: "v_4", name: "Philipp Poisel & Band – Freunde Tour 2026", datum: "18.06.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_5", name: "KARAT – Tour 2026", datum: "19.06.2026", uhrzeit: "20:00", endTime: "22:30", drivers: [] },
            { id: "v_6", name: "Walpurga – Das Musical", datum: "27.06.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_7", name: "Walpurga – Das Musical", datum: "03.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_8", name: "Walpurga – Das Musical", datum: "04.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_9", name: "Walpurga – Das Musical", datum: "11.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_10", name: "ABBA Diamonds – The ABBA Tribute Show", datum: "17.07.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_11", name: "Nordböhmische Philharmonie Teplice – Böhse Onkelz", datum: "18.07.2026", uhrzeit: "18:00", endTime: "", drivers: [] },
            { id: "v_12", name: "Heino – Made in Germany | Solo Tour", datum: "19.07.2026", uhrzeit: "17:00", endTime: "", drivers: [] },
            { id: "v_13", name: "Bonnie Tyler", datum: "21.07.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_14", name: "Walpurga – Das Musical", datum: "24.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_15", name: "Walpurga – Das Musical", datum: "25.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_16", name: "Walpurga – Das Musical", datum: "26.07.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_17", name: "Unter dem Himmel – Sommer Open-Air", datum: "31.07.2026", uhrzeit: "19:30", endTime: "", drivers: [] },
            { id: "v_18", name: "Unter dem Himmel – Sommer Open-Air", datum: "01.08.2026", uhrzeit: "17:15", endTime: "", drivers: [] },
            { id: "v_19", name: "Harzer Popschlager Open Air", datum: "08.08.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_20", name: "Die Prinzen mit Band", datum: "09.08.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_21", name: "Filmmusik XXL mit den Harzer Sinfonikern", datum: "13.08.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_22", name: "Saltatio Mortis", datum: "14.08.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_23", name: "Maggie Reilly – Everytime We Touch Tour", datum: "15.08.2026", uhrzeit: "19:30", endTime: "", drivers: [] },
            { id: "v_24", name: "VÖLKERBALL – A Tribute to Rammstein", datum: "21.08.2026", uhrzeit: "20:30", endTime: "", drivers: [] },
            { id: "v_25", name: "Münchener Freiheit – Live & Open Air", datum: "22.08.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_26", name: "Olaf Schubert und seine Freunde", datum: "26.08.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_27", name: "Walpurga – Das Musical", datum: "28.08.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_28", name: "Walpurga – Das Musical", datum: "29.08.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_30", name: "The Scottish Music Parade", datum: "31.08.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_31", name: "SILLY mit Julia Neigel – elektroAkustik", datum: "05.09.2026", uhrzeit: "20:00", endTime: "", drivers: [] },
            { id: "v_32", name: "Walpurga – Das Musical", datum: "10.09.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_33", name: "Walpurga – Das Musical", datum: "11.09.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_34", name: "Walpurga – Das Musical", datum: "12.09.2026", uhrzeit: "20:00", endTime: "23:30", drivers: [] },
            { id: "v_35", name: "Invisible Touch – a Tribute to Phil Collins", datum: "18.09.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_36", name: "Thomas Anders sings Modern Talking", datum: "19.09.2026", uhrzeit: "19:00", endTime: "", drivers: [] },
            { id: "v_37", name: "Sophia – Durch die Blume | Open Air", datum: "20.09.2026", uhrzeit: "19:00", endTime: "", drivers: [] }
        ];

        let localEvents = JSON.parse(localStorage.getItem('bergtheater_events')) || [];

        // STRICT DEDUPLICATION LOGIC:
        // Überschreibt existierende lokale Events basierend auf dem DATUM.
        // Falls ein lokales Event am selben Tag liegt, werden die Fahrer gerettet 
        // und die neuen, sauberen Angaben überschreiben den alten fehlerhaften Eintrag.
        const mergedEvents = [];

        geladeneVeranstaltungen.forEach(neuEvent => {
            const freshEvent = JSON.parse(JSON.stringify(neuEvent));
            mergedEvents.push(freshEvent);
        });

        localEvents.forEach(localEv => {
            const existing = mergedEvents.find(e => e.datum === localEv.datum);
            if (existing) {
                // Ein lokales Event mit demselben Datum existiert. 
                // Wir übernehmen NUR die manuell hinzugefügten Fahrer, nicht die falschen Uhrzeiten/Namen.
                if (localEv.drivers && localEv.drivers.length > 0) {
                    localEv.drivers.forEach(d => {
                        if (!existing.drivers.find(ed => ed.name === d.name)) {
                            existing.drivers.push(d);
                        }
                    });
                }
            } else {
                // Event liegt an einem Tag, an dem wir nichts vorgegeben haben (z.B. manuell importiert via Excel)
                mergedEvents.push(localEv);
            }
        });

        let events = mergedEvents;
        let currentEventId = null;

        function formatExcelDate(excelDate) { 
            const num = Number(excelDate); 
            if (!isNaN(num) && num > 30000 && num < 70000) { 
                const date = new Date(Math.round((num - 25569) * 86400 * 1000)); 
                return date.toLocaleDateString('de-DE', {day: '2-digit', month: '2-digit', year: 'numeric'}); 
            } 
            return excelDate; 
        }

        function getWochentag(datumString) { 
            if (!datumString) return ''; 
            const parts = datumString.split('.'); 
            if (parts.length === 3) { 
                const dateObj = new Date(parts[2], parts[1] - 1, parts[0]); 
                const tage = ['So.', 'Mo.', 'Di.', 'Mi.', 'Do.', 'Fr.', 'Sa.']; 
                return tage[dateObj.getDay()]; 
            } 
            return ''; 
        }

        window.onload = () => { 
            initDropdown(); 
            if ('serviceWorker' in navigator) { 
                navigator.serviceWorker.register('./sw.js').catch(err => console.error(err)); 
            } 
            events = events.map(ev => { 
                if (ev.datum && !ev.datum.includes('.')) { 
                    ev.datum = formatExcelDate(ev.datum); 
                } 
                return ev; 
            }); 
            saveData(); 
            cleanUpOldEvents(); 
            renderEvents(); 
        };

        function initDropdown() { 
            const select = document.getElementById('driverName'); 
            let optionsHTML = '<option value="">-- Bitte Fahrer auswählen --</option>'; 
            fahrerNamen.sort().forEach(name => { 
                optionsHTML += `<option value="${name}">${name}</option>`; 
            }); 
            select.innerHTML = optionsHTML; 
        }

        function cleanUpOldEvents() { 
            const today = new Date(); 
            today.setHours(0, 0, 0, 0); 
            events = events.filter(ev => { 
                const parts = ev.datum.split('.'); 
                if(parts.length === 3) { 
                    const eventDate = new Date(parts[2], parts[1] - 1, parts[0]); 
                    return eventDate >= today; 
                } 
                return true; 
            }); 
            saveData(); 
        }

        function renderEvents() { 
            const container = document.getElementById('eventList'); 
            container.innerHTML = ''; 
            if(events.length === 0) { 
                container.innerHTML = '<div class="text-center text-slate-400 mt-10"><i class="fa-regular fa-calendar-xmark text-4xl mb-3"></i><p>Keine Veranstaltungen vorhanden.</p></div>'; 
                return; 
            }
            events.sort((a,b) => { 
                const pa = a.datum.split('.'), pb = b.datum.split('.'); 
                return new Date(pa[2], pa[1]-1, pa[0]) - new Date(pb[2], pb[1]-1, pb[0]); 
            });
            events.forEach(ev => { 
                const driverNames = ev.drivers && ev.drivers.length > 0 ? ev.drivers.map(d => `<span class="bg-indigo-100 text-indigo-800 text-xs px-2 py-1 rounded inline-block mr-1 mb-1"><i class="fa-solid fa-user mr-1"></i>${d.name}</span>`).join('') : '<span class="text-slate-400 text-xs italic">Noch keine Fahrer eingeteilt</span>';
                let uhrzeitAnzeige = ev.uhrzeit ? String(ev.uhrzeit) : ""; 
                if (uhrzeitAnzeige && !uhrzeitAnzeige.includes('Uhr')) uhrzeitAnzeige += ' Uhr'; 
                if (ev.endTime) { 
                    let endZeit = String(ev.endTime); 
                    if (!endZeit.includes('Uhr')) endZeit += ' Uhr'; 
                    uhrzeitAnzeige += ` - ${endZeit}`; 
                }
                const card = document.createElement('div'); 
                card.className = "event-card bg-white p-4 rounded-xl shadow-sm border border-slate-200 cursor-pointer hover:border-indigo-400 transition"; 
                card.onclick = () => openModal(ev.id); 
                card.innerHTML = `<div class="flex justify-between items-start mb-2"><h3 class="font-bold text-lg leading-tight text-slate-800">${ev.name}</h3><button onclick="deleteEvent('${ev.id}', event)" class="text-red-400 hover:text-red-600 px-2 no-print"><i class="fa-solid fa-trash-can"></i></button></div><div class="text-sm text-slate-600 mb-3 font-medium"><i class="fa-regular fa-calendar text-indigo-500 mr-1"></i> ${getWochentag(ev.datum)} ${ev.datum} | <i class="fa-regular fa-clock text-indigo-500 mr-1"></i> ${uhrzeitAnzeige}</div><div class="border-t pt-3 mt-2">${driverNames}</div>`; 
                container.appendChild(card); 
            }); 
        }

        function deleteEvent(id, e) { 
            e.stopPropagation(); 
            if(confirm("Veranstaltung löschen?")) { 
                events = events.filter(ev => ev.id !== id); 
                saveData(); 
                renderEvents(); 
            } 
        }

        function deleteAllEvents() { 
            if(confirm("Möchtest du WIRKLICH ALLE Veranstaltungen löschen? Dies kann nicht rückgängig gemacht werden!")) { 
                events = []; 
                saveData(); 
                renderEvents(); 
            } 
        }

        function openModal(id) { 
            currentEventId = id; 
            const ev = events.find(e => e.id === id); 
            document.getElementById('modalTitle').innerText = ev.name; 
            document.getElementById('modalDateTime').innerText = `${ev.datum} ab ${ev.uhrzeit} Uhr`; 
            document.getElementById('driverName').value = ''; 
            document.getElementById('endTime').value = ev.endTime || ''; 
            renderDriverList(ev); 
            document.getElementById('eventModal').classList.remove('hidden'); 
        }

        function closeModal() { 
            document.getElementById('eventModal').classList.add('hidden'); 
            currentEventId = null; 
        }

        function printModal() { 
            document.body.classList.add('print-modal-mode'); 
            window.print(); 
            setTimeout(() => document.body.classList.remove('print-modal-mode'), 500); 
        }

        function renderDriverList(ev) { 
            const container = document.getElementById('driverList'); 
            container.innerHTML = ''; 
            ev.drivers?.forEach((d, index) => { 
                const div = document.createElement('div'); 
                div.className = "bg-white border rounded-lg p-3 flex justify-between"; 
                div.innerHTML = `<div><div class="font-bold">${d.name}</div><div class="text-xs">Fahrt: ${d.duty} | Besuch: ${d.attends}</div></div><button onclick="removeDriver(${index})" class="text-red-600"><i class="fa-solid fa-trash"></i></button>`; 
                container.appendChild(div); 
            }); 
        }

        function addDriver() { 
            const name = document.getElementById('driverName').value; 
            if(!name) return; 
            const ev = events.find(e => e.id === currentEventId); 
            if(!ev.drivers) ev.drivers = []; 
            ev.drivers.push({ 
                name, 
                duty: document.querySelector('input[name="duty"]:checked').value, 
                attends: document.querySelector('input[name="attends"]:checked').value 
            }); 
            saveData(); 
            renderDriverList(ev); 
            renderEvents(); 
        }

        function removeDriver(index) { 
            const ev = events.find(e => e.id === currentEventId); 
            ev.drivers.splice(index, 1); 
            saveData(); 
            renderDriverList(ev); 
            renderEvents(); 
        }

        function saveData() { 
            localStorage.setItem('bergtheater_events', JSON.stringify(events)); 
        }

        function generateId() {
            return Math.random().toString(36).substr(2, 9);
        }

        function handleExcelImport(e) { 
            const file = e.target.files[0]; 
            if(!file) return; 

            const reader = new FileReader(); 
            reader.onload = function(evt) { 
                const data = new Uint8Array(evt.target.result); 
                const workbook = XLSX.read(data, {type: 'array'}); 
                const firstSheet = workbook.Sheets[workbook.SheetNames[0]]; 
                
                const jsonData = XLSX.utils.sheet_to_json(firstSheet, {header: 1, raw: false}); 

                let importedCount = 0; 
                for (let i = 1; i < jsonData.length; i++) { 
                    const row = jsonData[i]; 
                    if (row[0] && row[1] && row[2]) { 
                        events.push({ 
                            id: generateId(), 
                            name: row[0], 
                            datum: formatExcelDate(row[1]), 
                            uhrzeit: row[2], 
                            endTime: row[3] || '', 
                            drivers: [] 
                        }); 
                        importedCount++; 
                    } 
                } 

                if(importedCount > 0) { 
                    saveData(); 
                    cleanUpOldEvents(); 
                    renderEvents(); 
                    alert(importedCount + " Veranstaltungen erfolgreich importiert!"); 
                } else { 
                    alert("Konnte keine Daten finden. Bitte prüfe, ob deine Tabelle in Spalte A beginnt."); 
                } 
            }; 
            reader.readAsArrayBuffer(file); 
            e.target.value = ''; 
        }

        function exportBackup() { 
            const dataStr = JSON.stringify(events); 
            const blob = new Blob([dataStr], { type: "application/json" }); 
            const url = URL.createObjectURL(blob); 
            const a = document.createElement('a'); 
            a.href = url; 
            a.download = `Bergtheater_Backup_${new Date().toISOString().split('T')[0]}.json`; 
            a.click(); 
        }

        function handleBackupImport(e) { 
            const file = e.target.files[0]; 
            if(!file) return; 
            const reader = new FileReader(); 
            reader.onload = function(e) { 
                try { 
                    events = JSON.parse(e.target.result); 
                    saveData(); 
                    renderEvents(); 
                } catch(err) { 
                    alert("Fehler beim Laden des Backups."); 
                } 
            }; 
            reader.readAsText(file); 
        }
    </script>
</body>
</html>
